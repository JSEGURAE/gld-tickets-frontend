<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <title>GLD Service Portal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎫</text></svg>" />
    <!-- Prevent flash of unstyled content: apply theme before first paint -->
    <script>
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem('gld-theme') || '{}');
          var theme = (stored.state && stored.state.theme) || null;
          var system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if ((theme || system) === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-C-_CoTzG.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DygU4DEy.css">
